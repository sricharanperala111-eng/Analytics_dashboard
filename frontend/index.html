<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Analytics Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; --muted:#94a3b8; }
  * { box-sizing:border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
  header { padding:24px 32px; border-bottom:1px solid #1e293b; }
  h1 { margin:0; font-size:22px; }
  main { padding:24px 32px; }
  .upload-box { border:2px dashed #334155; border-radius:12px; padding:40px; text-align:center; margin-bottom:28px; cursor:pointer; }
  .upload-box.drag { border-color:var(--accent); background:rgba(56,189,248,0.05); }
  .upload-box p { color:var(--muted); margin:8px 0 0; font-size:13px; }
  .kpis { display:grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap:16px; margin-bottom:28px; }
  .kpi { background:var(--card); border-radius:12px; padding:18px; }
  .kpi .label { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; }
  .kpi .value { font-size:24px; font-weight:700; margin-top:6px; color:var(--accent); }
  .charts { display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:28px; }
  .chart-card { background:var(--card); border-radius:12px; padding:20px; }
  .chart-card h3 { margin-top:0; font-size:14px; color:var(--muted); text-transform:uppercase; }
  table { width:100%; border-collapse:collapse; background:var(--card); border-radius:12px; overflow:hidden; }
  th, td { padding:10px 14px; text-align:left; font-size:13px; border-bottom:1px solid #334155; }
  th { color:var(--muted); text-transform:uppercase; font-size:11px; }
  input[type=file] { display:none; }
  .btn { background:var(--accent); color:#022c3d; border:none; padding:10px 18px; border-radius:8px; cursor:pointer; font-weight:600; }
  #status { color:#ef4444; margin-top:10px; font-size:13px; }
</style>
</head>
<body>

<header>
  <h1>📊 Analytics Dashboard</h1>
</header>

<main>
  <label class="upload-box" id="dropzone" for="fileInput">
    <div style="font-size:32px;">⬆️</div>
    <strong>Click or drag a CSV file here</strong>
    <p>The dashboard auto-detects numeric columns and a category column to summarize.</p>
    <input type="file" id="fileInput" accept=".csv" />
    <div id="status"></div>
  </label>

  <div id="results" style="display:none;">
    <div class="kpis" id="kpis"></div>
    <div class="charts">
      <div class="chart-card">
        <h3 id="breakdownTitle">Breakdown</h3>
        <canvas id="barChart"></canvas>
      </div>
      <div class="chart-card">
        <h3>Share</h3>
        <canvas id="pieChart"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h3>Preview (first 10 rows)</h3>
      <div style="overflow-x:auto;">
        <table id="previewTable"></table>
      </div>
    </div>
  </div>
</main>

<script>
const API = "http://localhost:8082/api/analysis/upload";
let barChart, pieChart;

const dropzone = document.getElementById("dropzone");
const fileInput = document.getElementById("fileInput");

fileInput.addEventListener("change", e => {
  if (e.target.files.length) uploadFile(e.target.files[0]);
});

["dragover", "dragleave", "drop"].forEach(evt => {
  dropzone.addEventListener(evt, e => e.preventDefault());
});
dropzone.addEventListener("dragover", () => dropzone.classList.add("drag"));
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag"));
dropzone.addEventListener("drop", e => {
  dropzone.classList.remove("drag");
  if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
});

async function uploadFile(file) {
  document.getElementById("status").innerText = "Uploading & analyzing...";
  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(API, { method: "POST", body: formData });
    if (!res.ok) {
      const msg = await res.text();
      document.getElementById("status").innerText = "Error: " + msg;
      return;
    }
    const data = await res.json();
    document.getElementById("status").innerText = "";
    renderResults(data);
  } catch (err) {
    document.getElementById("status").innerText = "Could not reach the backend. Is it running on port 8082?";
  }
}

function renderResults(data) {
  document.getElementById("results").style.display = "block";

  // KPIs
  const kpis = document.getElementById("kpis");
  kpis.innerHTML = `
    <div class="kpi"><div class="label">Rows</div><div class="value">${data.rowCount}</div></div>
    <div class="kpi"><div class="label">Columns</div><div class="value">${data.columns.length}</div></div>
  `;
  data.numericColumns.forEach(col => {
    const s = data.stats[col];
    kpis.innerHTML += `
      <div class="kpi">
        <div class="label">${col} (sum)</div>
        <div class="value">${s.sum.toLocaleString()}</div>
      </div>`;
  });

  // Breakdown charts (by category column, primary numeric metric)
  const breakdown = data.categoryBreakdown || {};
  const labels = Object.keys(breakdown);
  const values = Object.values(breakdown);
  const metricName = data.numericColumns[0] || "value";

  document.getElementById("breakdownTitle").innerText =
    `${metricName} by ${data.categoryColumn || "category"}`;

  const palette = ["#38bdf8","#a78bfa","#f472b6","#facc15","#4ade80","#fb923c","#f87171","#2dd4bf"];

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: { labels, datasets: [{ label: metricName, data: values, backgroundColor: "#38bdf8" }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "doughnut",
    data: { labels, datasets: [{ data: values, backgroundColor: palette }] },
    options: { plugins: { legend: { position: "bottom", labels: { color: "#e2e8f0" } } } }
  });

  // Preview table
  const table = document.getElementById("previewTable");
  const headRow = "<tr>" + data.columns.map(c => `<th>${c}</th>`).join("") + "</tr>";
  const bodyRows = data.preview.map(row =>
    "<tr>" + data.columns.map(c => `<td>${row[c] ?? ""}</td>`).join("") + "</tr>"
  ).join("");
  table.innerHTML = headRow + bodyRows;
}
</script>
</body>
</html>
